name: builder_bridge
description: BuilderBridge — Buyer Transparency Platform for Real Estate
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Database
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.30
  sqlite3: ^2.5.0
  path_provider: ^2.1.4

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Fonts & UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # File handling
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  mime: ^1.0.6

  # Notifications (Sprint 5 — flutter_timezone added back when notifications are built)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # PDF viewer placeholder
  flutter_pdfview: ^1.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.13
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4
  drift_dev: ^2.21.0

flutter:
  uses-material-design: true

  assets:
    - assets/seed/
    - assets/images/

  # Fonts served via google_fonts package — no local font files needed
