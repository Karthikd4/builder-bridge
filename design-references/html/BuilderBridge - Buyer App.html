<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BuilderBridge — Buyer App</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Manrope', 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #1a1d24;
    color: #fff;
  }
  #root { height: 100vh; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="inventory-data.jsx"></script>
<script type="text/babel" src="inventory-views.jsx"></script>
<script type="text/babel" src="inventory-controls.jsx"></script>
<script type="text/babel" src="inventory-explorer.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "builder": "builderbridge",
  "stage": "signed",
  "showFrame": true
}/*EDITMODE-END*/;

// ────────────────────────────────────────────────────────────
// App shell — handles tab nav, sub-screen routing, onboarding overlay.
// ────────────────────────────────────────────────────────────
function App() {
  const [t_, setTweak] = useTweaks(TWEAKS);
  const builder = BUILDERS[t_.builder] || BUILDERS.builderbridge;
  const t = useTokens(t_.dark, builder);

  // Tab + screen state. tab is one of: home, payments, documents, updates, profile
  // screen is the currently-shown overlay if non-null: inventory, estimate, aos.
  const [tab, setTab] = React.useState('home');
  const [overlay, setOverlay] = React.useState(null);
  const [onb, setOnb] = React.useState(null); // 0..3 or null

  const nav = (key) => {
    if (['home','payments','documents','updates','profile'].includes(key)) {
      setOverlay(null);
      setTab(key);
    } else {
      setOverlay(key);
    }
  };

  // titles per tab
  const tabTitle = {
    home: { title: builder.project, sub: `${builder.location} · RERA ${builder.rera}` },
    payments: { title: 'Payments', sub: '10-milestone schedule' },
    documents: { title: 'Documents', sub: 'Vault' },
    updates: { title: 'Updates', sub: 'Activity & alerts' },
    profile: { title: 'Profile', sub: BUYER.name },
  }[tab];

  // overlay titles
  const overlayTitle = {
    inventory: { title: 'Inventory', sub: `${builder.project} · Block A` },
    estimate: { title: 'Cost estimate', sub: `${builder.unit} · v3 final` },
    aos: { title: 'Agreement of Sale', sub: 'Draft v2' },
    unit: { title: builder.unit, sub: `${builder.typology}` },
    receipts: { title: 'Receipts & invoices', sub: '2 payments cleared' },
    loan: { title: 'Home loan', sub: 'HDFC · ₹1.85 Cr' },
    tickets: { title: 'Support', sub: 'SLA-tracked tickets' },
  }[overlay];

  const screen = (() => {
    if (overlay === 'inventory') return <InventoryScreen t={t} builder={builder} nav={nav}/>;
    if (overlay === 'estimate')  return <EstimateScreen t={t} builder={builder} stage={t_.stage}/>;
    if (overlay === 'aos')       return <AOSScreen t={t} builder={builder} stage={t_.stage} nav={nav}/>;
    if (overlay === 'unit')      return <UnitDetailScreen t={t} builder={builder} nav={nav}/>;
    if (overlay === 'receipts')  return <ReceiptsScreen t={t}/>;
    if (overlay === 'loan')      return <LoanScreen t={t} builder={builder}/>;
    if (overlay === 'tickets')   return <TicketsScreen t={t}/>;
    if (tab === 'home')          return <HomeScreen t={t} builder={builder} stage={t_.stage} nav={nav}/>;
    if (tab === 'payments')      return <PaymentsScreen t={t} builder={builder} nav={nav}/>;
    if (tab === 'documents')     return <DocumentsScreen t={t} builder={builder} nav={nav}/>;
    if (tab === 'updates')       return <UpdatesScreen t={t}/>;
    if (tab === 'profile')       return <ProfileScreen t={t} builder={builder} nav={nav}/>;
    return null;
  })();

  const topbar = overlay ? overlayTitle : tabTitle;
  const top = (
    <TopBar
      t={t}
      back={!!overlay}
      onBack={() => setOverlay(null)}
      leading={!overlay && (
        <div style={{
          width: 36, height: 36, borderRadius: 10, background: t.accent,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: builder.accentInk, flexShrink: 0,
        }}>
          <BBMark size={20} color={builder.accentInk}/>
        </div>
      )}
      title={topbar.title}
      subtitle={topbar.sub}
      trailing={!overlay && (
        <button onClick={() => nav('updates')} style={{
          width: 36, height: 36, borderRadius: 10, background: t.surfaceMute,
          border: 'none', cursor: 'pointer', position: 'relative',
          display: 'flex', alignItems: 'center', justifyContent: 'center', color: t.ink,
        }}>
          <Icon name="bell" size={18}/>
          <span style={{
            position: 'absolute', top: 6, right: 6, width: 8, height: 8, borderRadius: '50%',
            background: t.danger, border: `1.5px solid ${t.surfaceMute}`,
          }}/>
        </button>
      )}
    />
  );

  const app = (
    <div style={{
      width: '100%', height: '100%',
      background: t.bg, color: t.ink,
      display: 'flex', flexDirection: 'column',
      position: 'relative', overflow: 'hidden',
      fontFeatureSettings: '"ss01"',
    }} data-screen-label={overlay ? overlay : tab}>
      {top}
      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden' }} key={overlay || tab}>
        {screen}
      </div>
      {!overlay && <BottomTabs t={t} current={tab} onChange={(k) => { setOverlay(null); setTab(k); }}/>}
      {onb !== null && (
        <OnboardingScreen
          t={t} builder={builder} step={onb}
          onAdvance={() => onb === 3 ? setOnb(null) : setOnb(onb + 1)}
          onSkip={() => setOnb(null)}
        />
      )}
    </div>
  );

  // Auto-scale device to fit viewport height
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const fit = () => {
      const targetH = 920;
      const s = Math.min(1, (window.innerHeight - 32) / targetH);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      gap: 32, padding: 16, boxSizing: 'border-box',
      background: t_.dark ? '#070a14' : '#1a1d24',
      overflow: 'hidden',
    }}>
      <div style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
        {t_.showFrame ? (
          <IOSDevice width={402} height={874} dark={t_.dark}>
            {app}
          </IOSDevice>
        ) : (
          <div style={{ width: 402, height: 874, borderRadius: 28, overflow: 'hidden',
            boxShadow: '0 40px 80px rgba(0,0,0,0.5)', border: '1px solid rgba(255,255,255,0.06)' }}>
            {app}
          </div>
        )}
      </div>

      <TweaksPanel title="BuilderBridge">
        <TweakSection label="Theme">
          <TweakToggle label="Dark mode" value={t_.dark}
                       onChange={(v) => setTweak('dark', v)}/>
          <TweakToggle label="iOS device frame" value={t_.showFrame}
                       onChange={(v) => setTweak('showFrame', v)}/>
        </TweakSection>
        <TweakSection label="Builder white-label">
          <TweakSelect label="Builder" value={t_.builder}
                       options={BUILDER_KEYS.map((k) => ({ value: k, label: BUILDERS[k].name }))}
                       onChange={(v) => setTweak('builder', v)}/>
          <TweakColor label="Accent" value={builder.accent}
                      options={BUILDER_KEYS.map((k) => BUILDERS[k].accent)}
                      onChange={(v) => {
                        const key = BUILDER_KEYS.find((k) => BUILDERS[k].accent === v);
                        if (key) setTweak('builder', key);
                      }}/>
        </TweakSection>
        <TweakSection label="Buyer journey stage">
          <TweakSelect label="Stage" value={t_.stage}
                       options={[
                         { value: 'prospect',  label: '1. Prospect (browsing)' },
                         { value: 'visit',     label: '2. Visit scheduled' },
                         { value: 'estimate',  label: '3. Estimate shared' },
                         { value: 'booked',    label: '4. Token paid · booked' },
                         { value: 'aos',       label: '5. AOS under review' },
                         { value: 'signed',    label: '6. Signed · paying' },
                       ]}
                       onChange={(v) => setTweak('stage', v)}/>
        </TweakSection>
        <TweakSection label="Flow">
          <TweakButton label="Replay onboarding"
                       onClick={() => { setOnb(0); }}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
