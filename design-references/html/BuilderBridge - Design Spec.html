<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BuilderBridge — Buyer App Design Spec</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #0B1228;
    --ink-mute: #4A5168;
    --ink-faint: #8A91A4;
    --line: rgba(11, 18, 40, 0.10);
    --line-strong: rgba(11, 18, 40, 0.18);
    --bg: #F6F5F0;
    --surface: #FFFFFF;
    --surface-mute: #F2F1EB;
    --surface-sunk: #EDEBE4;
    --accent: #3457D5;
    --accent-soft: #EEF2FF;
    --accent-dark: #22398A;
    --ok: #1F8A5B;
    --warn: #B26A0F;
    --danger: #C0392B;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: 'ss01';
  }
  .hero-grad {
    background:
      radial-gradient(800px circle at 20% 30%, rgba(52,87,213,0.10), transparent 60%),
      radial-gradient(600px circle at 80% 60%, rgba(178,106,15,0.06), transparent 70%),
      var(--bg);
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .serif { font-family: 'Fraunces', serif; font-feature-settings: 'liga', 'ss01'; }
  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="spec-parts.jsx"></script>
<script type="text/babel" src="spec-parts-2.jsx"></script>
<script type="text/babel" src="spec-parts-3.jsx"></script>
<script type="text/babel" src="spec-parts-4.jsx"></script>

<script type="text/babel">
function Spec() {
  const builder = BUILDERS.builderbridge;
  const t = useTokens(false, builder);
  return (
    <div style={{ minHeight: '100vh' }}>
      <SpecHero/>
      <SpecPrinciples/>
      <SpecIA/>
      <SpecJourneys/>
      <SpecHierarchy t={t} builder={builder}/>
      <SpecNavStructure/>
      <SpecWireframes/>
      <SpecComponents t={t} builder={builder}/>
      <SpecUXPrinciples/>
      <SpecFooter/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Spec/>);
</script>
</body>
</html>
